<script>
    function updateKS4LoadCount() {
      const countRef = db.ref("page_loads/ks4_home");
  
      countRef.once("value").then(snapshot => {
        let currentCount = snapshot.val() || 0; // Get current count
        countRef.set(currentCount + 1); // Increment by 1
      }).catch(error => console.error("Error:", error));
    }
    document.addEventListener("DOMContentLoaded", updateKS4LoadCount);
</script>
