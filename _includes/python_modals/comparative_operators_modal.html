<dialog id="comparative_operators_modal" class="modal">
    <div class="modal-box">
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
        </form>
        <h3 class="font-bold text-lg">Comparative Operators</h3>
        <div class="modal-content py-4">
            <p class="py-2">Comparative operators compare values and return <code class="text-accent">True</code> or <code class="text-accent">False</code>. Common operators: <code class="text-accent">&gt;</code>, <code class="text-accent">&lt;</code>, <code class="text-accent">==</code>, <code class="text-accent">!=</code>, <code class="text-accent">&gt;=</code>, <code class="text-accent">&lt;=</code>.</p>

            <div class="flex-start">
                <div class="text-xs mr-1 mb-1">
                    <div class="mockup-window border bg-base-300">
                        <pre class="bg-base-200 px-4 pt-4"><code class="language-python">a = 5
b = 3
print(a &gt; b)   # True
print(a &lt; b)   # False
print(a == 5)    # True
print(a != 4)    # True</code></pre>
                    </div>
                </div>
                <div class="text-xs">
                    <div class="mockup-code">
                        <pre data-prefix=">">True</pre>
                        <pre data-prefix=">">False</pre>
                        <pre data-prefix=">">True</pre>
                        <pre data-prefix=">">True</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
